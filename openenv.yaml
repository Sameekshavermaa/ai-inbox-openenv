name: ai-inbox-env
version: 0.1.0
description: Emotion-aware inbox environment to evaluate AI agents on prioritization and decision-making
entrypoint: env:InboxEnv
type: http
spec_version: "1.0"
tasks:
  - id: easy
    name: "Easy Task"
    description: "Emotion and urgency classification of inbox emails."
  - id: medium
